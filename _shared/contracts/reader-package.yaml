name: reader-package
version: "1.0"
description: "Bilingual Markdown reading notes with source anchors and terminology ledger"
produced_by: civil-materials-reader
consumed_by:
  - civil-materials-figure
  - civil-materials-writing
  - civil-materials-research

artifacts:
  notes.md:
    description: "Bilingual Chinese-English markdown with source-anchored claims"
    required: true
  source_map.json:
    description: "Page-to-claim mapping JSON"
    required: true
    columns:
      claim_id: { type: string, required: true }
      source_page: { type: string, required: true }
      paragraph: { type: string, required: false }
      confidence: { type: string, required: false }
  terminology_ledger.md:
    description: "Domain terminology with Chinese-English mapping"
    required: false

templates:
  - ../../skills/civil-materials-reader/assets/templates/paper-md-template.md
  - ../../skills/civil-materials-reader/assets/templates/source-map-template.json
  - ../../skills/civil-materials-reader/assets/templates/source-anchor-checklist.md
  - ../../skills/civil-materials-reader/assets/templates/obsidian-note-template.md
