name: figure-handoff
version: "1.0"
description: "Figure planning and evidence mapping handoff from review-figure intake"
produced_by: materials-figure
consumed_by:
  - materials-paper2ppt
  - materials-pptx
  - materials-research

artifacts:
  figure_handoff.csv:
    description: "CSV with figure-to-evidence mapping"
    required: true
    columns:
      claim_id: { type: string, required: true }
      source_anchor: { type: string, required: true }
      measured_evidence: { type: string, required: true }
      inferred_mechanism: { type: string, required: false }
      figure_archetype: { type: string, required: true }
      caption_boundary: { type: string, required: true }
      certainty_tier: { type: string, required: true }
      reviewer_risk: { type: string, required: false }
      asset_id: { type: string, required: false }
      crop_status: { type: string, required: false }
      review_figure_support: { type: string, required: false }

templates:
  - ../../skills/materials-reader/assets/templates/figure-handoff-template.csv
  - ../../skills/materials-figure/assets/templates/review-figure-intake-template.csv
