name: citation-handoff
version: "1.0"
description: "Citation matrix and claim-source mapping from literature search and screening"
produced_by: materials-citation
consumed_by:
  - materials-reader
  - materials-figure
  - materials-research

artifacts:
  citation_handoff.csv:
    description: "CSV with claim-to-source mapping rows"
    required: true
    columns:
      claim_id: { type: string, required: true }
      source_anchor: { type: string, required: true }
      source_location: { type: string, required: false }
      original_excerpt: { type: string, required: false }
      measured_evidence: { type: string, required: true }
      inferred_mechanism: { type: string, required: false }
      boundary_or_missing_test: { type: string, required: false }
      citation_role: { type: string, required: true }
      evidence_type: { type: string, required: true }
      figure_archetype: { type: string, required: false }
      reviewer_risk: { type: string, required: false }
      handoff_target: { type: string, required: false }
      confidence_label: { type: string, required: false }
      missing_evidence_flag: { type: string, required: false }

templates:
  - ../../skills/materials-citation/assets/templates/citation-matrix-template.csv
  - ../../skills/materials-reader/assets/templates/citation-handoff-template.csv
