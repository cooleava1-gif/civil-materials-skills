name: doe-handoff
version: "1.0"
description: "Experiment design plan with analysis scripts, methods text, and data templates"
produced_by: materials-doe
consumed_by:
  - materials-writing
  - materials-figure
  - materials-data
  - materials-research

artifacts:
  experiment_plan.csv:
    description: "Full factorial or fractional factorial experiment matrix with factor levels and run order"
    required: true
  analysis_script.py:
    description: "Python script for ANOVA, regression, and DOE diagnostics"
    required: true
  methods_paragraph.md:
    description: "Ready-to-use methods section paragraph describing the experimental design"
    required: true
  figure_script.py:
    description: "Python script to generate DOE diagnostic and result plots"
    required: false
  data_template.csv:
    description: "Empty CSV with column headers for collecting experimental responses"
    required: true
  analysis_results.json:
    description: "Serialized ANOVA table, effect sizes, and model statistics after analysis"
    required: false

templates:
  - ../../skills/materials-doe/assets/templates/experiment-plan-template.csv
  - ../../skills/materials-doe/assets/templates/analysis-script-template.py
  - ../../skills/materials-doe/assets/templates/methods-paragraph-template.md
