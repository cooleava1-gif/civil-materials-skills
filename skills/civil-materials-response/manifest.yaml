always_load:
  - static/core/response-contract.md
  - static/core/workflow.md

axes:
  response_task:
    default: point-by-point
    values:
      point-by-point:
        path: references/response-strategy.md
        triggers: ["reviewer", "comments", "response", "point-by-point", "逐条回复", "回复审稿人"]
      response-patterns:
        path: references/response-patterns.md
        triggers: ["English needs major revision", "add more references", "novelty", "sample size", "error bars", "raw data", "conflicting reviewers", "高频审稿意见"]
      revision-plan:
        path: references/experiment-revision.md
        triggers: ["revise", "experiment", "additional test", "revision plan", "补实验", "修改方案"]
      document-format:
        path: references/response-document-format.md
        triggers: ["author response", "tracked changes", "revision cover letter", "response document", "回复文档", "修回格式"]
      language-polish:
        path: references/language-bank.md
        triggers: ["polish response", "tone", "rebuttal language", "语气", "润色回复"]
      risk-audit:
        path: references/response-risk-checklist.md
        triggers: ["risk", "reject", "major revision", "desk reject", "拒稿风险", "大修"]

  comment_type:
    default: mixed
    values:
      mechanism:
        path: references/experiment-revision.md
        triggers: ["mechanism", "FTIR", "SEM", "fluorescence", "XRD", "TG", "机理", "显微"]
      performance:
        path: references/experiment-revision.md
        triggers: ["strength", "bonding", "durability", "viscosity", "performance", "粘结", "耐久", "黏度"]
      writing:
        path: references/language-bank.md
        triggers: ["grammar", "English", "clarity", "language", "表达", "英文"]

  journal_family:
    default: civil-materials
    values:
      cbm-jbe:
        path: references/response-strategy.md
        triggers: ["CBM", "Construction and Building Materials", "JBE", "Journal of Building Engineering"]
      ccc:
        path: references/response-strategy.md
        triggers: ["CCC", "Cement and Concrete Composites", "CCR", "Cement and Concrete Research"]
      rmpd-ijpe:
        path: references/response-strategy.md
        triggers: ["RMPD", "IJPE", "JRE", "pavement", "Road Materials and Pavement Design"]
