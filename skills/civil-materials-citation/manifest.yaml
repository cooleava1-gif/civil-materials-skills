version: "1.1.0"

always_load:
  - static/core/contract.md
  - static/core/citation-contract.md
  - static/core/workflow.md

axes:
  task:
    default: citation-map
    values:
      search-plan:
        path: references/journal-search-profiles.md
        triggers: ["search", "database", "keyword", "检索", "关键词", "文献检索"]
      citation-map:
        path: references/claim-citation-mapping.md
        triggers: ["citation matrix", "claim", "reference", "引用", "证据链", "文献矩阵"]
      reference-gap:
        path: references/reference-gap-audit.md
        triggers: ["gap", "missing citation", "weak reference", "引用不足", "文献缺口"]
      wer-ea-screening:
        path: references/wer-ea-screening-and-source-quality.md
        triggers: ["WER-EA screening", "waterborne epoxy emulsified asphalt screening", "evidence layer", "source role", "水性环氧乳化沥青筛选", "证据层"]
      source-quality:
        path: references/wer-ea-screening-and-source-quality.md
        triggers: ["source quality", "primary experimental evidence", "weak background", "exclusion flag", "文献质量", "来源角色"]
      reviewer-safe-package:
        path: references/reference-gap-audit.md
        triggers: ["reviewer-safe citation package", "reviewer risk", "citation package", "审稿安全", "引用风险"]
      academic-search-mcp:
        path: references/academic-search-mcp.md
        triggers: ["academic-search MCP", "MCP", "automatic search", "自动检索", "文献检索MCP", "学术检索"]
  journal_family:
    default: civil-materials
    values:
      cbm-jbe:
        path: references/journal-search-profiles.md
        triggers: ["CBM", "Construction and Building Materials", "JBE", "Journal of Building Engineering"]
      ccc:
        path: references/journal-search-profiles.md
        triggers: ["CCC", "Cement and Concrete Composites"]
      rmpd-ijpe:
        path: references/journal-search-profiles.md
        triggers: ["RMPD", "Road Materials and Pavement Design", "IJPE", "International Journal of Pavement Engineering"]
  material_domain:
    default: civil-materials
    values:
      asphalt:
        path: static/fragments/domain/asphalt.md
        triggers: ["asphalt", "emulsified asphalt", "waterborne epoxy", "bitumen", "pavement", "沥青", "乳化沥青", "水性环氧"]
      cement-concrete:
        path: static/fragments/domain/cement-concrete.md
        triggers: ["cement", "concrete", "hydration", "mortar", "水泥", "混凝土"]
      civil-materials:
        path: static/fragments/domain/civil-materials.md
        triggers: ["civil materials", "construction materials", "土木材料", "建筑材料"]
assets:
  - assets
scripts:
  - scripts
tests:
  - mcp/academic_search/tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract

handoffs:
  provides:
    citation-handoff:
      description: "Citation matrix and claim-source mapping"
      contract: ../../_shared/contracts/citation-handoff.yaml
      version: "1.0"
  consumes: []
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
