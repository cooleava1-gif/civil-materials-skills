always_load:
  - static/core/figure-contract.md
  - static/core/workflow.md

axes:
  figure_type:
    default: performance
    values:
      performance:
        path: references/performance-figures.md
        triggers: ["strength", "bonding", "viscosity", "performance", "强度", "粘结", "黏度"]
      durability:
        path: references/durability-figures.md
        triggers: ["retention", "water", "aging", "freeze", "durability", "耐久", "水损害", "老化"]
      mechanism:
        path: references/mechanism-figures.md
        triggers: ["mechanism", "curing", "interface", "机制", "机理", "界面"]
      characterization:
        path: references/characterization-figures.md
        triggers: ["FTIR", "XRD", "TG", "DTG", "SEM", "TEM", "fluorescence", "rheology", "表征", "显微", "光谱", "热重"]
      summary:
        path: references/summary-figures.md
        triggers: ["radar", "matrix", "summary", "trade-off", "综合评价"]
      gallery:
        path: references/figure-gallery.md
        triggers: ["gallery", "figure gallery", "figure example", "style preset", "demo figure", "figure card", "图表示例"]
      production-spec:
        path: references/figure-production-spec.md
        triggers: ["dpi", "TIFF", "EPS", "PDF", "figure production", "submission figure", "分辨率", "投稿图", "出图规范"]

  domain:
    default: civil-materials
    values:
      asphalt:
        path: references/asphalt-figure-package.md
        triggers: ["asphalt", "emulsified asphalt", "waterborne epoxy", "沥青", "乳化沥青", "水性环氧"]
      cement-concrete:
        path: references/cement-concrete-figure-package.md
        triggers: ["cement", "concrete", "mortar", "水泥", "混凝土", "砂浆"]
      civil-materials:
        path: references/summary-figures.md
        triggers: ["civil materials", "construction materials", "土木材料", "建筑材料"]
