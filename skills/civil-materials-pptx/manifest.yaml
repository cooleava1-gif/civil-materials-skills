name: civil-materials-pptx
description: >
  Declarative manifest for the static/dynamic split
  SKILL.md uses this to decide which fragments to load for a given PPTX generation request.

version: 2.0.0

always_load:
  - static/core/principles.md
  - static/core/output-contract.md
  - static/core/workflow.md

axes:
  deck_type:
    default: research-report
    values:
      paper-reading:
        path: references/deck-structures.md
        triggers: ["paper", "journal club", "literature", "文献汇报", "精读"]
      research-report:
        path: references/deck-structures.md
        triggers: ["group meeting", "report", "thesis", "组会", "汇报", "开题"]
      mechanism:
        path: references/visual-style.md
        triggers: ["mechanism", "FTIR", "SEM", "fluorescence", "机理", "显微"]
      review-talk:
        path: references/deck-structures.md
        triggers: ["review", "综述", "research progress", "研究进展"]
  material_domain:
    default: civil-materials
    values:
      asphalt:
        path: references/deck-structures.md
        triggers: ["asphalt", "emulsified asphalt", "waterborne epoxy", "pavement", "沥青", "乳化沥青", "水性环氧"]
      cement-concrete:
        path: references/deck-structures.md
        triggers: ["cement", "concrete", "hydration", "水泥", "混凝土"]
  source_type:
    default: outline
    values:
      outline:
        path: references/pptx-generation.md
        triggers: ["outline", "markdown", ".md", "大纲"]
      json:
        path: references/pptx-generation.md
        triggers: ["json", ".json", "JSON outline"]
      data:
        path: references/pptx-generation.md
        triggers: ["data", "csv", "figure", "数据", "图表"]
assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract
handoffs:
  - civil-materials-research
  - civil-materials-reader
  - civil-materials-citation
  - civil-materials-figure
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json