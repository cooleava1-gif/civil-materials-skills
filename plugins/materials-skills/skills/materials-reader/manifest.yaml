version: "1.2.0"

always_load:
  - static/core/contract.md
  - ../_shared/core/terminology-ledger.md
  - ../_shared/core/ethics.md
  - static/core/reader-contract.md
  - static/core/workflow.md

axes:
  source_format:
    detect: |
      Determine the input form the user provided. Use pdf-text for a
      selectable-text PDF, scanned-pdf for an image-only or OCR-required PDF,
      doi-arxiv for a bare DOI or arXiv identifier/link that must be resolved
      first, html for a publisher or preprint HTML page, and pasted-text when
      the user pastes prose or notes with no retrievable original layout.
      If several apply (e.g., a DOI that resolves to a PDF), load the
      resolution fragment first, then the fragment for the resolved artifact.
    default: pasted-text
    multi: true
    values:
      pdf-text:
        path: static/fragments/source/pdf-text.md
        triggers: ["PDF", "paper file", "full paper", "文献PDF", "PDF file"]
      scanned-pdf:
        path: static/fragments/source/scanned-pdf.md
        triggers: ["scanned", "image-only", "OCR", "scan", "扫描"]
      doi-arxiv:
        path: static/fragments/source/doi-arxiv.md
        triggers: ["DOI", "arXiv", "10.", "arxiv.org", "doi.org"]
      html:
        path: static/fragments/source/html.md
        triggers: ["ScienceDirect", "Springer", "MDPI", "Taylor", "publisher page", "HTML"]
      pasted-text:
        path: static/fragments/source/pasted-text.md
        triggers: ["abstract", "copied text", "pasted", "粘贴", "摘要"]
  output_type:
    default: full-reader
    values:
      full-reader:
        path: references/full-reader.md
        triggers: ["full notes", "精读", "全文阅读", "中英对照"]
      literature-matrix:
        path: references/literature-matrix.md
        triggers: ["matrix", "table", "综述表", "文献矩阵"]
      evidence-chain-audit:
        path: references/evidence-chain-audit.md
        triggers: ["evidence chain", "claim evidence", "audit", "证据链", "证据审计", "审稿风险", "claim-evidence"]
      fulltext-figure-anchored-reading:
        path: references/fulltext-figure-anchored-reading.md
        triggers: ["paper.md", "source_map", "source map", "fulltext", "full-text", "figure card", "table card", "全文精读", "图表锚定"]
      wer-ea-intensive-reading-package:
        path: references/wer-ea-intensive-reading-package.md
        triggers: ["WER-EA reading package", "waterborne epoxy reading package", "30-paper", "translation_notes", "mechanism_evidence_table", "dosage_window_table", "review_handoff", "obsidian_note", "assets", "精读样例包", "水性环氧乳化沥青"]
      evidence-to-review-handoff:
        path: references/evidence-to-review-handoff.md
        triggers: ["source-map-first", "evidence-to-review", "citation handoff", "figure handoff", "citation_handoff", "figure_handoff", "source_anchor_checklist", "review package", "mini-review extraction", "综述交接", "引用交接", "图件交接"]
      pdf-visual-asset-extraction:
        path: references/pdf-visual-asset-extraction.md
        triggers: ["PDF visual assets", "asset_manifest", "contact_sheet", "rendered_pages", "visual_asset_spec", "crop figure", "crop table", "图页核验", "真图裁切"]
      microstructure-interpretation:
        path: references/microstructure-interpretation.md
        triggers: ["SEM", "fluorescence", "AFM", "DSC", "TG", "DTG", "microstructure", "morphology", "显微", "微观形貌"]
      journal-club:
        path: references/journal-club-reading.md
        triggers: ["journal club", "group meeting", "组会", "汇报"]
references:
  on_demand:
    pdf-reading:
      path: references/pdf-reading.md
      when: "The user needs PDF reading guidance."
    source-grounding:
      path: references/source-grounding.md
      when: "The user needs source grounding guidance."
    standard-output-package:
      path: references/standard-output-package.md
      when: "The user needs standard output package templates."
    table-system:
      path: references/table-system.md
      when: "The user needs table system templates."

assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract
handoffs:
  provides:
    reader-package:
      description: "Bilingual Markdown notes with source anchors"
      contract: ../../_shared/contracts/reader-package.yaml
      version: "1.0"
  consumes:
    - handoff: citation-handoff
      from: materials-citation
      optional: true
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
