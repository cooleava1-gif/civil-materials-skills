version: "1.1.0"

always_load:
  - static/core/contract.md
  - ../_shared/core/stance.md
  - ../_shared/core/evidence-contract.md
  - ../_shared/core/claim-strength-ladder.md
  - ../_shared/core/terminology-ledger.md
  - ../_shared/core/ethics.md
  - ../_shared/paper-production/weakness-routing.md
  - static/core/polishing-contract.md
  - static/core/workflow.md

axes:
  section:
    default: generic
    values:
      abstract:
        path: references/abstract.md
        triggers: ["abstract", "摘要"]
      introduction:
        path: references/introduction.md
        triggers: ["introduction", "intro", "引言", "前言"]
      results-discussion:
        path: references/results-discussion.md
        triggers: ["results", "discussion", "results and discussion", "结果", "讨论"]
      conclusions:
        path: references/conclusions.md
        triggers: ["conclusion", "conclusions", "closing paragraph", "结论"]
      cover-letter:
        path: references/cover-letter.md
        triggers: ["cover letter", "submission letter", "投稿信", "cover"]
      generic:
        path: references/style-guardrails.md
        triggers: ["polish", "rewrite", "translate", "润色", "翻译", "改写"]
      claim-strength:
        path: ../_shared/core/claim-strength-ladder.md
        triggers: ["overclaim", "claim", "causality", "novelty", "strengthen", "弱化", "因果", "创新性"]

  journal_family:
    default: civil-materials
    values:
      civil-materials:
        path: references/style-guardrails.md
        triggers: ["CBM", "JBE", "CSCM", "civil materials", "construction materials", "土木材料"]
      pavement:
        path: references/pavement-language.md
        triggers: ["RMPD", "IJPE", "JRE", "pavement", "asphalt", "路面", "沥青"]
      cement-concrete:
        path: references/cement-concrete-language.md
        triggers: ["CCC", "CCR", "cement", "concrete", "水泥", "混凝土"]

  language_mode:
    default: rulebook
    values:
      rulebook:
        path: references/language-rulebook.md
        triggers: ["language rules", "SCI style", "academic style", "语言规则", "写作规则"]
      chinese-to-english:
        path: references/chinese-to-english-patterns.md
        triggers: ["Chinese to English", "translate", "中译英", "中文润色"]
      claim-strength:
        path: ../_shared/core/claim-strength-ladder.md
        triggers: ["claim strength", "hedging", "causality", "overclaim", "语气", "强度"]

references:
  on_demand:
    journal-cbm-facts:
      path: ../_shared/journal-formats/cbm.md
      when: "The target journal is CBM, Construction and Building Materials."
    journal-ccc-facts:
      path: ../_shared/journal-formats/ccc.md
      when: "The target journal is CCC, Cement and Concrete Composites."
    journal-rmpd-facts:
      path: ../_shared/journal-formats/rmpd.md
      when: "The target journal is RMPD or IJPE."
    journal-jbe-facts:
      path: ../_shared/journal-formats/jbe.md
      when: "The target journal is JBE, Journal of Building Engineering."
assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract
handoffs:
  - civil-materials-research
  - civil-materials-reader
  - civil-materials-citation
  - civil-materials-figure
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
